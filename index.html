<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌉 오작교 도구</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --ink:#33262b; --sub:#8a7680; --line:#eadfe3; --paper:#fdfafb; --card:#ffffff;
    --rose:#c9527e; --rose-bg:#faeef3; --blue:#3b6fa0; --blue-bg:#e8f0f7;
    --ok:#2e7d5b; --ok-bg:#e9f4ee; --so:#b07c1f; --so-bg:#faf2e0; --no:#c24444; --no-bg:#fbecec;
    --past:#6b5e75; --past-bg:#efeaf2;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.6; padding:28px 16px 70px;}
  .wrap{max-width:860px; margin:0 auto;}
  header{text-align:center; margin-bottom:22px;}
  header h1{font-size:24px; font-weight:700; letter-spacing:-0.5px;}
  header p{color:var(--sub); font-size:13.5px; margin-top:4px;}
  .privacy{display:inline-block; margin-top:8px; font-size:12px; color:var(--ok);
    background:var(--ok-bg); padding:4px 12px; border-radius:20px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-bottom:14px;}
  .step{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .step .num{width:26px; height:26px; border-radius:50%; background:var(--rose); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex:none;}
  .step h2{font-size:16px; font-weight:700;}
  .hint{font-size:13px; color:var(--sub); margin-bottom:10px;}
  textarea{width:100%; height:80px; border:1px solid var(--line); border-radius:10px; padding:10px 12px;
    font-family:inherit; font-size:13px; resize:vertical; background:#fff;}
  textarea:focus,select:focus,input:focus{outline:2px solid var(--rose); outline-offset:1px; border-color:var(--rose);}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .btn{background:var(--rose); color:#fff; border:none; border-radius:10px; padding:9px 16px;
    font-size:13.5px; font-weight:600; cursor:pointer; font-family:inherit;}
  .btn:hover{background:#b0426c;}
  .btn.ghost{background:#fff; color:var(--rose); border:1px solid var(--rose);}
  input[type=file]{font-size:13px;}
  input[type=text],input[type=password]{border:1px solid var(--line); border-radius:10px; padding:9px 12px;
    font-size:13px; font-family:inherit; background:#fff;}
  .status{font-size:13px; margin-top:8px; min-height:18px;}
  .status.ok{color:var(--ok);} .status.err{color:var(--no);}
  select,input[type=number]{border:1px solid var(--line); border-radius:10px; padding:9px 12px;
    font-size:14px; font-family:inherit; background:#fff;}
  select{min-width:230px;}
  input[type=number]{width:64px; text-align:center;}
  label.tol{font-size:13px; color:var(--sub); display:flex; align-items:center; gap:6px;}
  details{margin-top:10px; font-size:13px; color:var(--sub);}
  summary{cursor:pointer; font-weight:600;}
  details ol{margin:8px 0 0 20px;}
  /* 탭 */
  .tabs{display:flex; gap:8px; margin:18px 0 14px;}
  .tab{flex:1; text-align:center; padding:11px 0; border-radius:12px; font-size:14.5px; font-weight:700;
    cursor:pointer; border:1px solid var(--line); background:#fff; color:var(--sub); font-family:inherit;}
  .tab.on{background:var(--rose); border-color:var(--rose); color:#fff;}
  .pane{display:none;} .pane.on{display:block;}
  /* 매칭 */
  .cond{margin-top:14px; display:none;}
  .cond .chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}
  .chip{font-size:12.5px; background:var(--rose-bg); color:var(--rose); padding:4px 12px; border-radius:20px; font-weight:600;}
  .cond .who{font-size:14px; font-weight:700;}
  .group{margin-top:22px;}
  .group h3{display:flex; align-items:center; gap:10px; font-size:15px; font-weight:700; margin-bottom:10px;}
  .dot{width:14px; height:14px; border-radius:50%; flex:none;}
  .g-ok .dot{background:var(--ok);} .g-so .dot{background:var(--so);} .g-no .dot{background:var(--no);} .g-past .dot{background:var(--past);}
  .g-ok h3{color:var(--ok);} .g-so h3{color:var(--so);} .g-no h3{color:var(--no);} .g-past h3{color:var(--past);}
  table{width:100%; border-collapse:collapse; font-size:13.5px; background:#fff;
    border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  th,td{padding:9px 12px; text-align:left; border-bottom:1px solid var(--line);}
  th{background:#faf6f8; font-weight:600; color:var(--sub); font-size:12.5px;}
  tr:last-child td{border-bottom:none;}
  .mark{font-size:15px;}
  .badge{display:inline-block; font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px;}
  .b-ok{background:var(--ok-bg); color:var(--ok);} .b-so{background:var(--so-bg); color:var(--so);}
  .b-no{background:var(--no-bg); color:var(--no);} .b-past{background:var(--past-bg); color:var(--past);}
  .summary{margin-top:16px; font-size:14px; color:var(--sub);}
  .mbtiline{font-size:11.5px; color:var(--sub); margin-top:3px;}
  .mbtiline b{color:var(--rose);}
  .empty{color:var(--sub); font-size:13px; padding:8px 2px;}
  /* 지도 */
  .filters{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;}
  .fbtn{font-size:12.5px; font-weight:600; padding:5px 14px; border-radius:20px; cursor:pointer;
    border:1px solid var(--line); background:#fff; color:var(--sub); font-family:inherit;}
  .fbtn.on{background:var(--rose); border-color:var(--rose); color:#fff;}
  #map{width:100%; height:520px; border-radius:12px; border:1px solid var(--line); background:#f4f0f1;}
  .legend{display:flex; gap:16px; margin-top:10px; font-size:12.5px; color:var(--sub); flex-wrap:wrap;}
  .legend span{display:flex; align-items:center; gap:6px;}
  .ldot{width:12px; height:12px; border-radius:50%; display:inline-block;}
  .pin{border-radius:20px; padding:2px 9px; font-size:12px; font-weight:700; color:#fff;
    white-space:nowrap; box-shadow:0 1px 4px rgba(0,0,0,0.25); border:2px solid #fff;}
  .pin.f{background:var(--rose);} .pin.m{background:var(--blue);} .pin.mix{background:#7a5c8f;}
  .leaflet-popup-content{font-family:inherit; font-size:13px; margin:10px 14px;}
  .leaflet-popup-content b{font-size:13.5px;}
  .pp{margin:4px 0; padding:4px 0; border-bottom:1px solid var(--line);}
  .pp:last-child{border-bottom:none;}
  .pp .meta{color:var(--sub); font-size:12px;}
  .unmatched{margin-top:12px; font-size:13px;}
  .unmatched b{color:var(--no);}
  @media (max-width:520px){ .card{padding:16px 14px;} select{min-width:100%;} #map{height:420px;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🌉 오작교 도구</h1>
    <p>매칭 계산기 · 거주지 지도 — 노션 프로필DB 자동 연동</p>
    <span class="privacy">🔒 명단은 이 기기 브라우저에만 저장 — 외부 전송 없음</span>
  </header>

  <div class="card">
    <div class="step"><span class="num">☁</span><h2>노션 자동 연동</h2></div>
    <p class="hint">열기만 하면 노션 프로필DB 최신 명단을 자동으로 불러옵니다.</p>
    <div class="row">
      <button class="btn" id="syncBtn">🔄 동기화</button>
      <button class="btn ghost" id="backupBtn">💾 백업 저장</button>
      <button class="btn ghost" id="clearBtn">이 기기에서 지우기</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="tabs">
    <button class="tab on" data-pane="matchPane">💘 매칭 계산기</button>
    <button class="tab" data-pane="mapPane">📍 거주지 지도</button>
  </div>

  <!-- ══ 매칭 계산기 ══ -->
  <div class="pane on" id="matchPane">
    <div class="card">
      <div class="step"><span class="num">1</span><h2>기준 인물 선택</h2></div>
      <div class="row">
        <select id="base" disabled><option>먼저 데이터를 불러오세요</option></select>
        <label class="tol">키 오차 ± <input type="number" id="tolH" value="3" min="0"> cm</label>
        <label class="tol">연생 오차 ± <input type="number" id="tolY" value="2" min="0"> 년</label>
      </div>
      <div class="cond" id="cond">
        <span class="who" id="condWho"></span>
        <div class="chips" id="condChips"></div>
      </div>
    </div>
    <div class="card">
      <div class="step"><span class="num">2</span><h2>판정 결과</h2></div>
      <div id="result"><p class="empty">기준 인물을 선택하면 결과가 여기에 표시됩니다.</p></div>
    </div>
  </div>

  <!-- ══ 거주지 지도 ══ -->
  <div class="pane" id="mapPane">
    <div class="card">
      <div class="filters" id="filters">
        <button class="fbtn on" data-f="all">전체</button>
        <button class="fbtn" data-f="여">여성만</button>
        <button class="fbtn" data-f="남">남성만</button>
        <button class="fbtn" data-f="active">종료 제외</button>
      </div>
      <div id="map"></div>
      <div class="legend">
        <span><span class="ldot" style="background:var(--rose)"></span> 여성</span>
        <span><span class="ldot" style="background:var(--blue)"></span> 남성</span>
        <span><span class="ldot" style="background:#7a5c8f"></span> 혼합 지역</span>
        <span>핀을 누르면 해당 지역 인원이 보입니다</span>
      </div>
      <div class="unmatched" id="unmatched"></div>
    </div>
  </div>
</div>

/* ↑ 암호는 비워두는 것을 권장합니다 (저장소가 공개라 코드에 넣으면 누구나 볼 수 있음).

   (예: https://.../index.html#key=비밀번호) 이 기기에 저장되어 이후 자동 동기화됩니다.

function getKey(){
  const m = (location.hash || '').match(/key=([^&]+)/);
  if (m){
    const k = decodeURIComponent(m[1]);
    try{ localStorage.setItem('synckey', k); }catch(e){}
    return k;
  }
  if (SYNC_KEY) return SYNC_KEY;
  try{ return localStorage.getItem('synckey') || ''; }catch(e){ return ''; }
}

/* ══════════ 공통: 데이터 ══════════ */
let people = [], rawData = '', map = null, layer = null, filter = 'all';

function parseDelimited(text){
  text = text.replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n').trim();
  const delim = text.split('\n')[0].includes('\t') ? '\t' : ',';
  const rows = []; let row = []; let cell = ''; let inQ = false;
  for (let i = 0; i < text.length; i++){
    const ch = text[i];
    if (inQ){
      if (ch === '"'){ if (text[i+1] === '"'){ cell += '"'; i++; } else inQ = false; }
      else cell += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === delim){ row.push(cell); cell = ''; }
      else if (ch === '\n'){ row.push(cell); rows.push(row); row = []; cell = ''; }
      else cell += ch;
    }
  }
  if (cell !== '' || row.length){ row.push(cell); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ''));
}
function norm(s){ return (s || '').replace(/\s+/g, '').trim(); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function buildPeople(rows){
  const headers = rows[0].map(h => norm(h));
  const idx = name => headers.indexOf(norm(name));
  const need = ['성별', '출생연도', '키'];
  const missing = need.filter(n => idx(n) === -1);
  if (idx('이름') === -1 && idx('코드명') === -1) missing.push('이름 또는 코드명');
  if (missing.length) throw new Error('필수 열이 없습니다: ' + missing.join(', '));
  const get = (r, name) => { const i = idx(name); return i === -1 ? '' : (r[i] || '').trim(); };
  const num = (r, name) => { const v = parseFloat(get(r, name)); return isNaN(v) ? null : v; };
  return rows.slice(1).map(r => ({
    이름: get(r, '이름'), 코드명: get(r, '코드명') || get(r, '이름'),
    성별: get(r, '성별'), 연도: num(r, '출생연도'), 키: num(r, '키'),
    거주지: get(r, '거주지'), 직업: get(r, '직업'), 상태: get(r, '상태'),
    종교: get(r, '종교'), 흡연: get(r, '흡연'), MBTI: get(r, 'MBTI').toUpperCase(),
    이력: get(r, '소개이력'),
    키하한: num(r, '이상형키하한'), 키상한: num(r, '이상형키상한'),
    연하한: num(r, '이상형연생하한'), 연상한: num(r, '이상형연생상한'),
    이상형종교: get(r, '이상형종교'), 이상형흡연: get(r, '이상형흡연')
  })).filter(p => p.코드명);
}

function loadData(text, fromSaved){
  const st = document.getElementById('status');
  try{
    people = buildPeople(parseDelimited(text));
    if (!people.length) throw new Error('데이터 행이 없습니다.');
    rawData = text;
    if (!fromSaved){ try{ localStorage.setItem('matchdata', text); }catch(e){} }
    st.className = 'status ok';
    st.textContent = '✅ ' + people.length + '명 불러오기 완료' + (fromSaved ? ' (이 기기에 저장된 명단)' : '');
    const sel = document.getElementById('base');
    sel.disabled = false;
    sel.innerHTML = '<option value="">기준 인물을 선택하세요</option>' +
      people.map((p, i) => `<option value="${i}">${p.코드명}</option>`).join('');
    document.getElementById('cond').style.display = 'none';
    document.getElementById('result').innerHTML = '<p class="empty">기준 인물을 선택하면 결과가 여기에 표시됩니다.</p>';
    draw();
  } catch(e){
    st.className = 'status err';
    st.textContent = '⚠️ ' + e.message;
  }
}

/* ══════════ 매칭 계산기 ══════════ */
function judgeRange(val, lo, hi, tol){
  if (val == null) return '➖';
  const L = lo == null ? -Infinity : lo, H = hi == null ? Infinity : hi;
  if (val >= L && val <= H) return '⭕';
  if (val >= L - tol && val <= H + tol) return '🔺';
  return '❌';
}
function judgeReligion(cond, val){
  if (!cond || cond === '무관') return '⭕';
  if (!val) return '➖';
  return cond === val ? '⭕' : '❌';
}
function judgeSmoke(cond, val){
  if (!cond || cond === '무관') return '⭕';
  if (!val) return '➖';
  if (cond === '비흡연만') return val === '비흡연' ? '⭕' : '❌';
  return cond === val ? '⭕' : '❌';
}
function overall(marks){
  if (marks.includes('❌')) return 'no';
  if (marks.includes('🔺')) return 'so';
  return 'ok';
}

/* ═══ MBTI 궁합 2.0 (재미 요소, 판정 미반영) ═══
   ① 기질(NF·NT·SJ·SP) 4×4 기본점 — Tieger & Barron-Tieger 커플 조사 보고치를
      앵커로 사용 (SJ-SJ 79%, NF-NF 73%, NT×SP 비대칭 54/73 등) 후 스케일 조정
   ② 세부 글자 보정: 일치 글자당 +3, 둘 다 F +3, 완전 동일 유형 +4
   ③ 유명 조합은 전용 코멘트. 점수 범위 53~93점 (완벽한 궁합은 없다는 뜻) */
const MBTI_NICK = {INTJ:'전략가',INTP:'사색가',ENTJ:'통솔자',ENTP:'변론가',
  INFJ:'옹호자',INFP:'중재자',ENFJ:'선도자',ENFP:'활동가',
  ISTJ:'원칙주의자',ISFJ:'수호자',ESTJ:'관리자',ESFJ:'외교관',
  ISTP:'장인',ISFP:'예술가',ESTP:'승부사',ESFP:'연예인'};
const TEMPER_BASE = {'NF|NF':72,'NT|NT':70,'SJ|SJ':74,'SP|SP':68,
  'NF|NT':67,'SJ|SP':62,'NT|SP':58,'NT|SJ':56,'NF|SJ':55,'NF|SP':53};
const TEMPER_TXT = {
  'NF|NF':'감성 만렙 커플, 서로의 세계를 깊이 이해',
  'NT|NT':'토론이 곧 데이트, 지적 케미 폭발',
  'SJ|SJ':'안정감 최강, 계획대로 착착 흘러가는 연애',
  'SP|SP':'오늘 뭐 하지? 즉흥 모험 콤비',
  'NF|NT':'이상과 전략의 만남, 대화가 밤새 이어지는 조합',
  'SJ|SP':'현실 감각 공유, 루틴러와 자유인의 밀당',
  'NT|SP':'쿨내 나는 실용주의 콤비, 감정 표현은 숙제',
  'NT|SJ':'전략가와 관리자, 존중하면 든든·부딪히면 고집 대결',
  'NF|SJ':'따뜻함은 통하지만 꿈과 현실의 간극 조율 필요',
  'NF|SP':'설렘 가득 스파크, 길게 가려면 대화 결 맞추기'};
const MBTI_SPECIAL = {
  'ENFP|INTJ':'소문난 환상의 짝꿍, 서로의 부족한 반쪽',
  'ENTP|INFJ':'밀당 장인들의 만남, 티키타카 최강 조합',
  'ENFJ|INFP':'서로를 성장시키는 힐링 커플',
  'ENTJ|INTP':'두뇌 풀가동 파워 콤비',
  'ESFP|ISTJ':'반대라서 끌리는 국민 반전 커플',
  'ESTP|ISFJ':'이끄는 사람과 지켜주는 사람의 케미',
  'ESFJ|ISTP':'챙김 장인과 무심한 츤데레의 조합',
  'ENFP|INFJ':'서로의 마음을 읽어주는 소울메이트 감성'};
function temperOf(t){ return t[1] === 'N' ? (t[2] === 'T' ? 'NT' : 'NF') : (t[3] === 'J' ? 'SJ' : 'SP'); }
function mbtiInfo(a, b){
  const re = /^[EI][NS][TF][JP]$/;
  a = (a || '').toUpperCase().trim(); b = (b || '').toUpperCase().trim();
  if (!re.test(a) || !re.test(b)) return null;
  const tKey = [temperOf(a), temperOf(b)].sort().join('|');
  let s = TEMPER_BASE[tKey];
  let match = 0;
  for (let i = 0; i < 4; i++) if (a[i] === b[i]) match++;
  s += match * 3;
  if (a[2] === 'F' && b[2] === 'F') s += 3;
  if (a === b) s += 4;
  const pKey = [a, b].sort().join('|');
  let reason = MBTI_SPECIAL[pKey] || TEMPER_TXT[tKey];
  if (a === b) reason = '판박이 케미, 편하지만 자극은 적을 수 있음';
  else if (!MBTI_SPECIAL[pKey] && a[2] !== b[2]) reason += ' · 갈등 시 논리×감정 온도차 주의';
  return { s, label: a + '(' + MBTI_NICK[a] + ') × ' + b + '(' + MBTI_NICK[b] + ')', reason };
}

function render(){
  const sel = document.getElementById('base');
  const out = document.getElementById('result');
  if (sel.value === '') return;
  const base = people[+sel.value];
  const tolH = parseFloat(document.getElementById('tolH').value) || 0;
  const tolY = parseFloat(document.getElementById('tolY').value) || 0;

  const chips = [];
  if (base.키하한 != null || base.키상한 != null)
    chips.push('키 ' + (base.키하한 ?? '~') + ' ~ ' + (base.키상한 ?? '') + 'cm');
  if (base.연하한 != null || base.연상한 != null)
    chips.push((base.연하한 ? String(base.연하한).slice(2) : '~') + '년생 ~ ' + (base.연상한 ? String(base.연상한).slice(2) + '년생' : ''));
  if (base.이상형종교 && base.이상형종교 !== '무관') chips.push('종교: ' + base.이상형종교);
  if (base.이상형흡연 && base.이상형흡연 !== '무관') chips.push(base.이상형흡연);
  const condBox = document.getElementById('cond');
  condBox.style.display = 'block';
  document.getElementById('condWho').textContent = base.코드명 + ' 님의 이상형 조건';
  document.getElementById('condChips').innerHTML = chips.length
    ? chips.map(c => '<span class="chip">' + esc(c) + '</span>').join('')
    : '<span class="chip">조건 없음 (전원 적합 처리)</span>';

  const cands = people.filter(p => p !== base && p.성별 && base.성별 && p.성별 !== base.성별)
    .map(p => {
      const 키 = judgeRange(p.키, base.키하한, base.키상한, tolH);
      const 연 = judgeRange(p.연도, base.연하한, base.연상한, tolY);
      const 종 = judgeReligion(base.이상형종교, p.종교);
      const 흡 = judgeSmoke(base.이상형흡연, p.흡연);
      const 과거 = (base.이력 && p.코드명 && base.이력.includes(p.코드명)) ||
                   (p.이력 && base.코드명 && p.이력.includes(base.코드명));
      return { p, 키, 연, 종, 흡, g: 과거 ? 'past' : overall([키, 연, 종, 흡]) };
    });

  if (!cands.length){
    out.innerHTML = '<p class="empty">성별이 다른 후보가 없습니다. (성별 열이 채워져 있는지 확인해 보세요)</p>';
    return;
  }

  const groups = [
    { key: 'ok', title: '적합', cls: 'g-ok', badge: 'b-ok', label: '⭕ 적합' },
    { key: 'so', title: '애매 (오차범위)', cls: 'g-so', badge: 'b-so', label: '🔺 애매' },
    { key: 'no', title: '부적합', cls: 'g-no', badge: 'b-no', label: '❌ 부적합' },
    { key: 'past', title: '소개/만남 이력 있음 (재매칭 제외)', cls: 'g-past', badge: 'b-past', label: '⛔ 이력' }
  ];
  let html = '';
  const counts = {};
  for (const g of groups){
    const list = cands.filter(c => c.g === g.key);
    counts[g.key] = list.length;
    html += `<div class="group ${g.cls}"><h3><span class="dot"></span>${g.title} · ${list.length}명</h3>`;
    if (!list.length){ html += '<p class="empty">해당 없음</p></div>'; continue; }
    html += `<table><tr><th>후보</th><th>키</th><th>연생</th><th>종교</th><th>흡연</th><th>판정</th></tr>`;
    for (const c of list){
      const mi = mbtiInfo(base.MBTI, c.p.MBTI);
      html += `<tr><td><b>${esc(c.p.코드명)}</b><br><span style="color:var(--sub);font-size:12px">${esc(c.p.직업 || '')}${c.p.거주지 ? ' · ' + esc(c.p.거주지) : ''}</span>` +
        `${mi ? '<div class="mbtiline">' + mi.label + ' · <b>' + mi.s + '점</b> — ' + esc(mi.reason) + '</div>' : ''}</td>` +
        `<td class="mark">${c.p.키 ?? '-'} ${c.키}</td>` +
        `<td class="mark">${c.p.연도 ? String(c.p.연도).slice(2) : '-'} ${c.연}</td>` +
        `<td class="mark">${esc(c.p.종교 || '-')} ${c.종}</td>` +
        `<td class="mark">${esc(c.p.흡연 || '-')} ${c.흡}</td>` +
        `<td><span class="badge ${g.badge}">${g.label}</span></td></tr>`;
    }
    html += '</table></div>';
  }
  html += `<p class="summary">총 ${cands.length}명 자동 판정 — ⭕ ${counts.ok} · 🔺 ${counts.so} · ❌ ${counts.no} · ⛔ ${counts.past}
    <br>➖(정보없음)는 탈락 처리하지 않고 통과로 계산합니다.
    <br style="line-height:1.9">💡 MBTI 점수는 판정에 반영되지 않는 재미 요소입니다 — 기질(NF·NT·SJ·SP) 조합별 커플 만족도 보고치(Tieger & Barron-Tieger)를 앵커로 한 자체 산식이며, 과학적으로 검증된 궁합 지표는 아닙니다.</p>`;
  out.innerHTML = html;
}

/* ══════════ 거주지 지도 ══════════ */
function geocode(addr){
  const a = norm(addr);
  if (!a) return null;
  for (const k of KEYS){
    if (a.includes(norm(k))) return { key: k, ll: GEO[k] };
  }
  return null;
}

function draw(){
  if (!map) return;
  if (layer) layer.remove();
  layer = L.layerGroup().addTo(map);
  const shown = people.filter(p => {
    if (filter === '여' || filter === '남') return p.성별 === filter;
    if (filter === 'active') return !(p.상태 || '').includes('종료');
    return true;
  });
  const groups = {}; const unmatched = [];
  for (const p of shown){
    const g = geocode(p.거주지);
    if (!g){ if (p.거주지) unmatched.push(p); continue; }
    (groups[g.key] = groups[g.key] || { ll: g.ll, list: [] }).list.push(p);
  }
  const bounds = [];
  for (const key in groups){
    const g = groups[key];
    const sexes = new Set(g.list.map(p => p.성별));
    const cls = sexes.size > 1 ? 'mix' : (sexes.has('여') ? 'f' : 'm');
    const label = g.list.length === 1 ? g.list[0].코드명 : key + ' ' + g.list.length + '명';
    const icon = L.divIcon({ className: '', html: '<span class="pin ' + cls + '">' + esc(label) + '</span>', iconAnchor: [30, 12] });
    const popup = '<b>📍 ' + esc(key) + ' · ' + g.list.length + '명</b>' +
      g.list.map(p => '<div class="pp"><b>' + esc(p.코드명) + '</b>' +
        '<div class="meta">' + esc([p.직업, p.연도 ? String(p.연도).slice(2) + '년생' : '', p.상태].filter(Boolean).join(' · ')) + '</div></div>').join('');
    L.marker(g.ll, { icon }).bindPopup(popup).addTo(layer);
    bounds.push(g.ll);
  }
  if (bounds.length) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 12 });
  const un = document.getElementById('unmatched');
  un.innerHTML = unmatched.length
    ? '<b>위치 미확인 ' + unmatched.length + '명:</b> ' +
      unmatched.map(p => esc(p.코드명) + ' (' + esc(p.거주지) + ')').join(', ') +
      ' <span style="color:var(--sub)">— 노션 거주지에 지역명을 포함해 주세요 (예: 연신내, 광교, 서울 강남구)</span>'
    : (Object.keys(groups).length ? '' : '<span class="empty">표시할 인원이 없습니다.</span>');
}

/* ══════════ 동기화 · 백업 ══════════ */
async function doSync(silent){
  const key = getKey();
  const st = document.getElementById('status');
  if (SYNC_URL.includes('여기에')){
    st.className = 'status err';
    st.textContent = '⚠️ 파일 상단의 SYNC_URL에 연동 주소를 먼저 입력해 주세요.';
    return;
  }
  if (!key){
    if (!silent){
      st.className = 'status err';
      st.textContent = '⚠️ 암호가 설정되지 않았습니다. 주소 뒤에 #key=암호 를 붙여 한 번 열어주세요.';
    }
    return;
  }
  st.className = 'status'; st.textContent = '☁️ 노션에서 불러오는 중...';
  try{
    const r = await fetch(SYNC_URL + (SYNC_URL.includes('?') ? '&' : '?') + 'key=' + encodeURIComponent(key));
    if (r.status === 401) throw new Error('암호가 올바르지 않습니다. (주소 뒤 #key= 값 확인)');
    if (!r.ok) throw new Error('연동 서버 응답 오류 (' + r.status + ')');
    const text = await r.text();
    loadData(text);
    st.className = 'status ok';
    st.textContent = '☁️ 노션 동기화 완료 · ' + people.length + '명 — ' + new Date().toLocaleString('ko-KR');
  }catch(e){
    st.className = 'status err';
    st.textContent = '⚠️ 동기화 실패: ' + e.message + (people.length ? ' — 이 기기에 저장된 명단으로 계속 사용합니다.' : '');
  }
}

document.getElementById('syncBtn').addEventListener('click', () => doSync(false));
document.getElementById('backupBtn').addEventListener('click', () => {
  const st = document.getElementById('status');
  if (!rawData){
    st.className = 'status err';
    st.textContent = '⚠️ 백업할 데이터가 없습니다. 먼저 동기화하거나 CSV를 불러오세요.';
    return;
  }
  const d = new Date();
  const ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const hasBom = rawData.charCodeAt(0) === 0xFEFF;
  const blob = new Blob([(hasBom ? '' : '\uFEFF') + rawData], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '프로필DB_백업_' + ds + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
  st.className = 'status ok';
  st.textContent = '💾 백업 저장됨: 프로필DB_백업_' + ds + '.csv';
});

document.getElementById('clearBtn').addEventListener('click', () => {
  try{ localStorage.removeItem('matchdata'); localStorage.removeItem('synckey'); localStorage.removeItem('synccfg'); }catch(e){}
  people = []; rawData = '';
  const sel = document.getElementById('base');
  sel.disabled = true;
  sel.innerHTML = '<option>먼저 데이터를 불러오세요</option>';
  document.getElementById('cond').style.display = 'none';
  document.getElementById('result').innerHTML = '<p class="empty">기준 인물을 선택하면 결과가 여기에 표시됩니다.</p>';
  draw();
  const st = document.getElementById('status');
  st.className = 'status ok';
  st.textContent = '🗑 이 기기에 저장된 명단과 암호를 삭제했습니다.';
});

/* ══════════ 탭 ══════════ */
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  document.getElementById(t.dataset.pane).classList.add('on');
  if (t.dataset.pane === 'mapPane' && map){
    setTimeout(() => { map.invalidateSize(); draw(); }, 50);
  }
}));

/* ══════════ 매칭/지도 이벤트 ══════════ */
document.getElementById('base').addEventListener('change', render);
document.getElementById('tolH').addEventListener('input', render);
document.getElementById('tolY').addEventListener('input', render);
document.getElementById('filters').addEventListener('click', e => {
  const b = e.target.closest('.fbtn');
  if (!b) return;
  document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  filter = b.dataset.f;
  draw();
});

/* ══════════ 초기화 ══════════ */
map = L.map('map').setView([37.5, 127.0], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

(function(){
  try{
    const saved = localStorage.getItem('matchdata');
    if (saved) loadData(saved, true);
  }catch(e){}
  if (getKey()) doSync(true);
})();
</script>
</body>
